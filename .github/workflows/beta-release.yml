name: Beta Release

on:
  push:
    branches:
      - beta
  workflow_dispatch:
    inputs:
      version_suffix:
        description: 'Beta version suffix (e.g., beta.1, nightly.20240207)'
        required: false
        default: ''

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Use Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20.x"
          cache: "npm"

      - name: Install dependencies
        run: npm ci

      - name: Generate beta version
        id: beta_version
        run: |
          BASE_VERSION=$(node -p "require('./package.json').version")
          TIMESTAMP=$(date +%Y%m%d%H%M%S)
          COMMIT_SHORT=$(git rev-parse --short HEAD)
          
          if [ -n "${{ github.event.inputs.version_suffix }}" ]; then
            BETA_VERSION="${BASE_VERSION}-${{ github.event.inputs.version_suffix }}"
          else
            BETA_VERSION="${BASE_VERSION}-beta.${TIMESTAMP}.${COMMIT_SHORT}"
          fi
          
          echo "BETA_VERSION=${BETA_VERSION}" >> $GITHUB_OUTPUT
          echo "BASE_VERSION=${BASE_VERSION}" >> $GITHUB_OUTPUT
          echo "Generated beta version: ${BETA_VERSION}"

      - name: Update manifest for beta
        run: |
          node -e "
          const fs = require('fs');
          const manifest = JSON.parse(fs.readFileSync('manifest.json', 'utf8'));
          manifest.version = '${{ steps.beta_version.outputs.BETA_VERSION }}';
          fs.writeFileSync('manifest.json', JSON.stringify(manifest, null, '\t'));
          "

      - name: Build plugin
        run: npm run build

      - name: Create release package
        run: |
          mkdir release-files
          cp main.js manifest.json release-files/
          if [ -f styles.css ]; then
            cp styles.css release-files/
          fi

      - name: Create or Update Beta Release
        uses: softprops/action-gh-release@v1
        with:
          tag_name: ${{ steps.beta_version.outputs.BETA_VERSION }}
          name: Beta Release ${{ steps.beta_version.outputs.BETA_VERSION }}
          draft: false
          prerelease: true
          files: |
            release-files/main.js
            release-files/manifest.json
            release-files/styles.css
          body: |
            ## Beta Release
            
            **Base Version:** ${{ steps.beta_version.outputs.BASE_VERSION }}
            **Beta Version:** ${{ steps.beta_version.outputs.BETA_VERSION }}
            **Commit:** ${{ github.sha }}
            
            This is a pre-release beta version for testing purposes.
            
            ### Installation
            1. Download `main.js` and `manifest.json`
            2. Place them in your vault's `.obsidian/plugins/metadata-link-parser/` folder
            3. Reload Obsidian
            
            ### Changes
            ${{ github.event.head_commit.message }}
          generate_release_notes: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
