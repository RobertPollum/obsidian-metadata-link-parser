name: Nightly Release

on:
  schedule:
    # Run every day at 2 AM UTC
    - cron: '0 2 * * *'
  workflow_dispatch:

jobs:
  check-commits:
    runs-on: ubuntu-latest
    outputs:
      should_release: ${{ steps.check.outputs.should_release }}
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Check for new commits
        id: check
        run: |
          # Check if there are commits in the last 24 hours
          COMMITS=$(git log --since="24 hours ago" --oneline | wc -l)
          if [ "$COMMITS" -gt 0 ] || [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            echo "should_release=true" >> $GITHUB_OUTPUT
            echo "Found $COMMITS commits in the last 24 hours"
          else
            echo "should_release=false" >> $GITHUB_OUTPUT
            echo "No commits in the last 24 hours, skipping release"
          fi

  build:
    needs: check-commits
    if: needs.check-commits.outputs.should_release == 'true'
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Use Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20.x"
          cache: "npm"

      - name: Install dependencies
        run: npm ci

      - name: Generate nightly version
        id: nightly_version
        run: |
          BASE_VERSION=$(node -p "require('./package.json').version")
          DATE=$(date +%Y%m%d)
          COMMIT_SHORT=$(git rev-parse --short HEAD)
          NIGHTLY_VERSION="${BASE_VERSION}-nightly.${DATE}.${COMMIT_SHORT}"
          
          echo "NIGHTLY_VERSION=${NIGHTLY_VERSION}" >> $GITHUB_OUTPUT
          echo "BASE_VERSION=${BASE_VERSION}" >> $GITHUB_OUTPUT
          echo "Generated nightly version: ${NIGHTLY_VERSION}"

      - name: Update manifest for nightly
        run: |
          node -e "
          const fs = require('fs');
          const manifest = JSON.parse(fs.readFileSync('manifest.json', 'utf8'));
          manifest.version = '${{ steps.nightly_version.outputs.NIGHTLY_VERSION }}';
          fs.writeFileSync('manifest.json', JSON.stringify(manifest, null, '\t'));
          "

      - name: Build plugin
        run: npm run build

      - name: Create release package
        run: |
          mkdir release-files
          cp main.js manifest.json release-files/
          if [ -f styles.css ]; then
            cp styles.css release-files/
          fi

      - name: Delete old nightly releases
        uses: actions/github-script@v7
        with:
          script: |
            const releases = await github.rest.repos.listReleases({
              owner: context.repo.owner,
              repo: context.repo.repo,
              per_page: 100
            });
            
            const nightlyReleases = releases.data.filter(r => 
              r.tag_name.includes('-nightly.') && r.prerelease
            );
            
            // Keep only the last 7 nightly releases
            const toDelete = nightlyReleases.slice(7);
            
            for (const release of toDelete) {
              console.log(`Deleting old nightly release: ${release.tag_name}`);
              await github.rest.repos.deleteRelease({
                owner: context.repo.owner,
                repo: context.repo.repo,
                release_id: release.id
              });
              
              // Also delete the tag
              try {
                await github.rest.git.deleteRef({
                  owner: context.repo.owner,
                  repo: context.repo.repo,
                  ref: `tags/${release.tag_name}`
                });
              } catch (error) {
                console.log(`Could not delete tag ${release.tag_name}: ${error.message}`);
              }
            }

      - name: Create Nightly Release
        uses: softprops/action-gh-release@v1
        with:
          tag_name: ${{ steps.nightly_version.outputs.NIGHTLY_VERSION }}
          name: Nightly ${{ steps.nightly_version.outputs.NIGHTLY_VERSION }}
          draft: false
          prerelease: true
          files: |
            release-files/main.js
            release-files/manifest.json
            release-files/styles.css
          body: |
            ## 🌙 Nightly Release
            
            **Base Version:** ${{ steps.nightly_version.outputs.BASE_VERSION }}
            **Nightly Version:** ${{ steps.nightly_version.outputs.NIGHTLY_VERSION }}
            **Commit:** ${{ github.sha }}
            **Built:** ${{ github.event.repository.updated_at }}
            
            This is an automated nightly build for testing the latest changes.
            
            ⚠️ **Warning:** Nightly builds may be unstable. Use at your own risk.
            
            ### Installation
            1. Download `main.js` and `manifest.json`
            2. Place them in your vault's `.obsidian/plugins/metadata-link-parser/` folder
            3. Reload Obsidian
            
            ### Recent Changes
            See the auto-generated release notes below for recent commits.
          generate_release_notes: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
